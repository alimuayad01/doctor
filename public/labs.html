<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المختبرات والتحاليل | طبيبي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .labs-page { padding: 100px 0 60px; }
    .lab-card { background: white; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow-sm); transition: var(--transition); }
    .lab-card:hover { box-shadow: var(--shadow-md); transform: translateY(-4px); }
    .lab-card-header { background: linear-gradient(135deg, #9C27B0, #673AB7); padding: 24px; color: white; }
    .lab-card-body { padding: 20px; }
    .service-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
    .service-item:last-child { border-bottom: none; }
  </style>
</head>
<body>
<nav class="navbar scrolled" style="background:rgba(255,255,255,0.98);backdrop-filter:blur(20px);">
  <div class="nav-inner">
    <a class="nav-logo" href="/" style="color:var(--primary)">🏥 طبيبي<span>.</span></a>
    <div class="nav-links" style="display:flex">
      <a class="nav-link" href="/search.html" style="color:var(--text-dark)">البحث عن طبيب</a>
      <a class="nav-link" href="/departments.html" style="color:var(--text-dark)">الأقسام</a>
      <a class="nav-link" href="/labs.html" style="color:var(--primary);background:rgba(26,107,138,0.08)">المختبرات</a>
    </div>
    <div class="nav-actions" id="navActions"></div>
  </div>
</nav>

<div class="labs-page">
  <div class="container">
    <div style="text-align:center;margin-bottom:40px">
      <h1 style="font-size:2.2rem;color:var(--text-dark)">🔬 المختبرات والتحاليل</h1>
      <p style="color:var(--text-medium)">ابحث عن مختبر في محافظتك واحجز تحاليلك بسهولة</p>
    </div>

    <div style="display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap">
      <select class="form-control" id="filterGov" style="flex:1;min-width:180px" onchange="loadLabs()">
        <option value="">كل المحافظات</option>
      </select>
      <select class="form-control" id="filterType" style="flex:1;min-width:180px" onchange="loadLabs()">
        <option value="">كل الأنواع</option>
        <option>مختبر تحاليل</option>
        <option>مركز أشعة</option>
        <option>مركز تصوير طبي</option>
        <option>بصريات</option>
      </select>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px" id="labsGrid">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<!-- Book Lab Modal -->
<div id="labModal" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeLabModal()">
  <div class="modal">
    <div class="modal-header">
      <h3>🔬 حجز تحليل</h3>
      <button class="modal-close" onclick="closeLabModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="labModalInfo" style="padding:14px;background:var(--secondary);border-radius:var(--radius-sm);margin-bottom:20px"></div>
      <div id="servicesSection"></div>
      <div class="form-group" style="margin-top:16px">
        <label class="form-label">📅 التاريخ</label>
        <input type="date" class="form-control" id="labDate">
      </div>
      <div class="form-group">
        <label class="form-label">⏰ الوقت التقريبي</label>
        <select class="form-control" id="labTime">
          <option>08:00 صباحاً</option>
          <option>09:00 صباحاً</option>
          <option>10:00 صباحاً</option>
          <option>11:00 صباحاً</option>
          <option>12:00 ظهراً</option>
          <option>13:00 بعد الظهر</option>
          <option>14:00 بعد الظهر</option>
          <option>15:00 بعد الظهر</option>
          <option>16:00 بعد الظهر</option>
        </select>
      </div>
      <div id="labBookAlert"></div>
      <button class="btn btn-accent btn-full btn-lg" onclick="confirmLabBooking()">✅ تأكيد الحجز</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  let currentLabId = null;
  let currentLabServices = [];

  // Navbar
  const user = getUser();
  const navActions = document.getElementById('navActions');
  if (user && getToken()) {
    const dashboards = { doctor: '/dashboard-doctor.html', institution: '/dashboard-institution.html', patient: '/dashboard-patient.html' };
    navActions.innerHTML = `<button class="btn btn-outline btn-sm" onclick="window.location='${dashboards[user.role]}'">لوحة التحكم</button>`;
  } else {
    navActions.innerHTML = `<button class="btn btn-outline btn-sm" onclick="window.location='/login.html'">الدخول</button><button class="btn btn-primary btn-sm" onclick="window.location='/register.html'">سجل</button>`;
  }

  // Load governorates
  api('GET', '/departments/governorates').then(({ governorates }) => {
    const sel = document.getElementById('filterGov');
    governorates.forEach(g => sel.innerHTML += `<option value="${g}">${g}</option>`);
  }).catch(() => {});

  const loadLabs = async () => {
    const gov = document.getElementById('filterGov').value;
    const type = document.getElementById('filterType').value;
    const params = new URLSearchParams();
    if (gov) params.set('governorate', gov);
    if (type) params.set('type', type);

    const grid = document.getElementById('labsGrid');
    grid.innerHTML = '<div class="spinner" style="grid-column:1/-1"></div>';

    try {
      const { labs } = await api('GET', `/labs?${params}`);
      if (!labs || labs.length === 0) {
        grid.innerHTML = '<p style="text-align:center;color:var(--text-light);padding:60px;grid-column:1/-1">لا توجد مختبرات في هذه المنطقة</p>';
        return;
      }
      grid.innerHTML = labs.map(lab => `
        <div class="lab-card">
          <div class="lab-card-header">
            <div style="font-size:1.8rem;margin-bottom:8px">🔬</div>
            <h3 style="margin:0;font-size:1.1rem">${lab.name}</h3>
            <p style="opacity:0.85;font-size:0.85rem;margin-top:4px">${lab.type}</p>
          </div>
          <div class="lab-card-body">
            <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">
              <span style="font-size:0.875rem;color:var(--text-medium)">📍 ${lab.governorate}${lab.address ? ' - ' + lab.address : ''}</span>
              ${lab.phone ? `<span style="font-size:0.875rem;color:var(--text-medium)">📞 ${lab.phone}</span>` : ''}
              ${lab.workingHours ? `<span style="font-size:0.875rem;color:var(--text-medium)">⏰ ${lab.workingHours}</span>` : ''}
            </div>
            ${lab.services && lab.services.length > 0 ? `
              <h4 style="font-size:0.9rem;margin-bottom:10px;color:var(--text-dark)">الخدمات:</h4>
              <div>${lab.services.slice(0,3).map(s => `<div class="service-item"><span>${s.name}</span><span style="color:var(--primary);font-weight:700">${s.price?.toLocaleString() || '-'} د.ع</span></div>`).join('')}</div>
            ` : ''}
            <button class="btn btn-accent btn-sm btn-full" style="margin-top:16px" onclick="openLabBooking('${lab._id}','${lab.name}','${lab.type}',${JSON.stringify(lab.services || []).replace(/'/g,"&#39;")})">📅 احجز تحليلاً</button>
          </div>
        </div>
      `).join('');
    } catch (err) {
      grid.innerHTML = `<p style="text-align:center;color:var(--danger);grid-column:1/-1">${err.message}</p>`;
    }
  };

  const openLabBooking = (labId, name, type, services) => {
    if (!getToken()) {
      showToast('يجب تسجيل الدخول أولاً', 'warning');
      setTimeout(() => window.location = '/login.html', 1500);
      return;
    }
    currentLabId = labId;
    currentLabServices = services;
    document.getElementById('labModalInfo').innerHTML = `<strong>🔬 ${name}</strong> - ${type}`;

    const servEl = document.getElementById('servicesSection');
    if (services && services.length > 0) {
      servEl.innerHTML = `
        <label class="form-label">اختر الخدمات المطلوبة</label>
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
          ${services.map((s,i) => `
            <label style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:0.9rem">
              <input type="checkbox" name="labService" value="${i}" style="width:16px;height:16px">
              <span style="flex:1">${s.name}</span>
              <span style="color:var(--primary);font-weight:700">${s.price?.toLocaleString() || 0} د.ع</span>
            </label>
          `).join('')}
        </div>
      `;
    } else {
      servEl.innerHTML = '';
    }

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('labDate').min = today;
    document.getElementById('labDate').value = today;
    document.getElementById('labBookAlert').innerHTML = '';
    document.getElementById('labModal').style.display = 'flex';
  };

  const closeLabModal = () => { document.getElementById('labModal').style.display = 'none'; };

  const confirmLabBooking = async () => {
    const alertEl = document.getElementById('labBookAlert');
    const date = document.getElementById('labDate').value;
    const time = document.getElementById('labTime').value;

    const selectedServiceIndexes = [...document.querySelectorAll('input[name="labService"]:checked')].map(cb => parseInt(cb.value));
    const selectedServices = selectedServiceIndexes.map(i => currentLabServices[i]).filter(Boolean);

    try {
      await api('POST', '/labs/order', {
        labId: currentLabId,
        services: selectedServices.length > 0 ? selectedServices : currentLabServices.slice(0, 1),
        date,
        time,
      });
      closeLabModal();
      showToast('تم تأكيد حجز التحليل! سنُشعرك بجاهزية النتيجة ✅', 'success', 4000);
    } catch (err) {
      alertEl.innerHTML = `<div class="alert alert-error">❌ ${err.message}</div>`;
    }
  };

  loadLabs();
</script>
</body>
</html>
