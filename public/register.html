<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب | طبيبي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { min-height: 100vh; background: linear-gradient(135deg, var(--primary-dark), var(--primary-light)); display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { background: white; border-radius: var(--radius-xl); padding: 40px 36px; width: 100%; max-width: 560px; box-shadow: var(--shadow-lg); animation: slideUp 0.4s ease; }
    .auth-logo { text-align: center; margin-bottom: 24px; }
    .auth-logo a { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
    .auth-logo a span { color: var(--accent); }
    .role-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
    .role-btn {
      padding: 14px 8px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: white;
      cursor: pointer;
      text-align: center;
      transition: var(--transition);
      font-family: var(--font);
    }
    .role-btn:hover { border-color: var(--primary); }
    .role-btn.selected { border-color: var(--primary); background: rgba(26,107,138,0.06); }
    .role-btn .role-icon { font-size: 1.6rem; display: block; margin-bottom: 6px; }
    .role-btn .role-name { font-size: 0.8rem; font-weight: 700; color: var(--text-dark); }
    .extra-fields { display: none; padding: 16px; background: var(--secondary); border-radius: var(--radius-sm); margin-bottom: 16px; }
    .extra-fields.show { display: block; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media(max-width:480px){ .auth-card{ padding: 28px 18px; } .two-col{ grid-template-columns:1fr; } }
  </style>
</head>
<nav class="navbar scrolled" style="background:rgba(255,255,255,0.98)!important;backdrop-filter:blur(20px);">
  <div class="nav-inner">
    <a class="nav-logo" href="/" style="color:var(--primary)" data-i18n="app_name">🏥 طبيبي<span>.</span></a>
    <div class="lang-switcher" style="display:flex; gap:10px; margin-right:20px;">
      <button class="lang-btn" onclick="setLanguage('ar')" style="border:none; background:none; cursor:pointer; font-weight:800; color:var(--primary)">العربية</button>
      <button class="lang-btn" onclick="setLanguage('ku')" style="border:none; background:none; cursor:pointer; font-weight:800; color:var(--primary)">کوردی</button>
      <button class="lang-btn" onclick="setLanguage('en')" style="border:none; background:none; cursor:pointer; font-weight:800; color:var(--primary)">EN</button>
    </div>
  </div>
</nav>

<div class="auth-card" style="margin-top:80px">
  <div class="auth-logo">
    <a href="/" data-i18n="app_name">🏥 طبيبي<span>.</span></a>
    <p style="color:var(--text-medium);font-size:0.9rem;margin-top:6px;" data-i18n="register">إنشاء حساب جديد مجاناً</p>
  </div>

  <div id="alertBox"></div>

  <!-- Role Selector -->
  <div class="role-selector">
    <button class="role-btn" id="role-patient" onclick="selectRole('patient')">
      <span class="role-icon">👤</span>
      <span class="role-name" data-i18n="patient">مريض / زبون</span>
    </button>
    <button class="role-btn" id="role-doctor" onclick="selectRole('doctor')">
      <span class="role-icon">👨‍⚕️</span>
      <span class="role-name" data-i18n="doctor">طبيب</span>
    </button>
    <button class="role-btn" id="role-institution" onclick="selectRole('institution')">
      <span class="role-icon">🏥</span>
      <span class="role-name" data-i18n="institution">مؤسسة طبية</span>
    </button>
  </div>

  <form id="registerForm" onsubmit="handleRegister(event)">
    <div class="two-col">
      <div class="form-group">
        <label class="form-label">الاسم الكامل</label>
        <input type="text" class="form-control" id="name" placeholder="محمد أحمد..." required>
      </div>
      <div class="form-group">
        <label class="form-label">رقم الهاتف</label>
        <input type="tel" class="form-control" id="phone" placeholder="07X-XXX-XXXX" required>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">📧 البريد الإلكتروني (اختياري)</label>
      <input type="email" class="form-control" id="email" placeholder="example@email.com">
    </div>

    <div class="form-group">
      <label class="form-label">🏙️ المحافظة</label>
      <select class="form-control" id="governorate" required>
        <option value="">اختر محافظتك</option>
        <option value="بغداد">بغداد</option>
        <option value="البصرة">البصرة</option>
        <option value="نينوى">نينوى</option>
        <option value="أربيل">أربيل</option>
        <option value="النجف">النجف</option>
        <option value="كربلاء">كربلاء</option>
        <option value="بابل">بابل</option>
        <option value="الأنبار">الأنبار</option>
        <option value="صلاح الدين">صلاح الدين</option>
        <option value="ديالى">ديالى</option>
        <option value="كركوك">كركوك</option>
        <option value="واسط">واسط</option>
        <option value="ميسان">ميسان</option>
        <option value="القادسية">القادسية</option>
        <option value="ذي قار">ذي قار</option>
        <option value="المثنى">المثنى</option>
        <option value="السليمانية">السليمانية</option>
        <option value="دهوك">دهوك</option>
      </select>
    </div>

    <!-- Doctor extra fields -->
    <div class="extra-fields" id="doctorFields">
      <p style="font-weight:700;color:var(--primary);margin-bottom:12px;">👨‍⚕️ معلومات الطبيب</p>
      <div class="two-col">
        <div class="form-group" style="margin:0">
          <label class="form-label">التخصص</label>
          <input type="text" class="form-control" id="specialization" placeholder="مثال: طب باطني">
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">القسم</label>
          <select class="form-control" id="department">
            <option value="">القسم الطبي</option>
            <option value="الطب الباطني">الطب الباطني</option>
            <option value="طب الأطفال">طب الأطفال</option>
            <option value="النساء والتوليد">النساء والتوليد</option>
            <option value="جراحة العظام">جراحة العظام</option>
            <option value="طب العيون">طب العيون</option>
            <option value="طب الأسنان">طب الأسنان</option>
            <option value="الأمراض الجلدية">الأمراض الجلدية</option>
            <option value="أمراض القلب">أمراض القلب</option>
            <option value="المختبرات والتحاليل">المختبرات والتحاليل</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Institution extra fields -->
    <div class="extra-fields" id="institutionFields">
      <p style="font-weight:700;color:var(--warning);margin-bottom:12px;">🏥 معلومات المؤسسة</p>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label">اسم المؤسسة</label>
        <input type="text" class="form-control" id="institutionName" placeholder="مستشفى / عيادة...">
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label">نوع المؤسسة</label>
        <select class="form-control" id="institutionType">
          <option value="">اختر النوع</option>
          <option>مستشفى</option>
          <option>عيادة</option>
          <option>مركز طبي</option>
          <option>مختبر</option>
          <option>مركز أشعة</option>
          <option>صيدلية</option>
        </select>
      </div>
    </div>

    <div class="two-col">
      <div class="form-group">
        <label class="form-label">🔒 كلمة المرور</label>
        <input type="password" class="form-control" id="password" placeholder="6 أحرف على الأقل" required minlength="6">
      </div>
      <div class="form-group">
        <label class="form-label">🔒 تأكيد المرور</label>
        <input type="password" class="form-control" id="confirmPassword" placeholder="أعد كلمة المرور" required>
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-full btn-lg" id="registerBtn" style="margin-bottom:16px;">
      إنشاء الحساب
    </button>
    <p style="text-align:center;color:var(--text-medium);font-size:0.9rem;">
      لديك حساب؟ <a href="/login.html" style="color:var(--primary);font-weight:700;">تسجيل الدخول</a>
    </p>
    <p style="text-align:center;margin-top:10px;">
      <a href="/" style="color:var(--text-light);font-size:0.85rem;">← العودة للرئيسية</a>
    </p>
  </form>
</div>

<!-- Verification Modal -->
<div id="verifyModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(26,107,138,0.7);z-index:9999;backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px">
  <div class="auth-card" style="margin:0;max-width:420px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,0.3)">
    <div style="font-size:3.5rem;margin-bottom:20px">📱</div>
    <h2 style="margin-bottom:10px;color:var(--primary);font-weight:800">تأكيد رقم الهاتف</h2>
    <p style="color:var(--text-medium);margin-bottom:24px;line-height:1.6">أدخل رمز التحقق المكون من 6 أرقام المرسل إلى هاتفك <br><span id="targetPhone" style="font-weight:800;color:var(--primary)"></span></p>
    <div class="form-group" style="margin-bottom:24px">
      <input type="text" class="form-control" id="otpCode" placeholder="******" 
             style="text-align:center;font-size:2rem;letter-spacing:12px;font-weight:900;height:65px;border-width:3px" maxlength="6">
    </div>
    <div id="verifyAlert"></div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <button class="btn btn-primary btn-full btn-lg" onclick="confirmOTP()" id="verifySubmitBtn">تفعيل الحساب ✅</button>
      <button class="btn btn-outline btn-full" onclick="resendOTP()" id="resendBtn">إعادة إرسال الرمز</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/i18n.js"></script>
<script>
  redirectIfLoggedIn();
  let selectedRole = 'patient';

  // Auto-select role from URL
  const urlParams = new URLSearchParams(window.location.search);
  const urlRole = urlParams.get('role');
  if (urlRole) selectRole(urlRole);
  else selectRole('patient');

  function selectRole(role) {
    selectedRole = role;
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById(`role-${role}`)?.classList.add('selected');
    document.getElementById('doctorFields').classList.toggle('show', role === 'doctor');
    document.getElementById('institutionFields').classList.toggle('show', role === 'institution');
  }

  // Load governorates and departments
  const loadData = async () => {
    try {
      const [govRes, deptRes] = await Promise.all([
        api('GET', '/departments/governorates'),
        api('GET', '/departments'),
      ]);
      const govSel = document.getElementById('governorate');
      if (govRes.governorates.length > 0) {
        const existingGovs = Array.from(govSel.options).map(o => o.value);
        govRes.governorates.forEach(g => { 
          if (!existingGovs.includes(g)) govSel.innerHTML += `<option value="${g}">${g}</option>`;
        });
      }
      const deptSel = document.getElementById('department');
      const existingDepts = Array.from(deptSel.options).map(o => o.value);
      deptRes.departments.forEach(d => { 
        if (!existingDepts.includes(d.name)) deptSel.innerHTML += `<option value="${d.name}">${d.name}</option>`;
      });
    } catch {}
  };
  loadData();

  let currentPhone = '';

  const handleRegister = async (e) => {
    e.preventDefault();
    const alertBox = document.getElementById('alertBox');
    alertBox.innerHTML = '';
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    let phone = document.getElementById('phone').value.trim();
    if (phone.startsWith('0')) phone = '+964' + phone.slice(1);
    else if (!phone.startsWith('+')) phone = '+964' + phone;

    if (password !== confirmPassword) {
      alertBox.innerHTML = '<div class="alert alert-error">❌ كلمتا المرور غير متطابقتين</div>';
      return;
    }

    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.textContent = 'جاري إنشاء الحساب...';

    const body = {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      phone,
      password,
      role: selectedRole,
      governorate: document.getElementById('governorate').value,
    };

    if (selectedRole === 'doctor') {
      body.specialization = document.getElementById('specialization').value;
      body.department = document.getElementById('department').value;
    }
    if (selectedRole === 'institution') {
      body.institutionName = document.getElementById('institutionName').value;
      body.institutionType = document.getElementById('institutionType').value;
    }

    try {
      const data = await api('POST', '/auth/register', body);
      setAuth(data.token, data.user);
      
      // Open OTP Modal instead of redirect
      currentPhone = phone;
      document.getElementById('targetPhone').textContent = phone;
      document.getElementById('verifyModal').style.display = 'flex';
      showToast('تم إنشاء الحساب! يرجى إدخال الرمز المرسل لهاتفك 📱', 'success');
    } catch (err) {
      alertBox.innerHTML = `<div class="alert alert-error">❌ ${err.message}</div>`;
      btn.disabled = false;
      btn.textContent = 'إنشاء الحساب';
    }
  };

  const confirmOTP = async () => {
    const code = document.getElementById('otpCode').value;
    const alertBox = document.getElementById('verifyAlert');
    const btn = document.getElementById('verifySubmitBtn');
    
    if (code.length < 6) return;
    
    btn.disabled = true;
    btn.textContent = 'جاري التحقق...';
    
    try {
      await api('POST', '/auth/verify-otp', { phone: currentPhone, code });
      showToast('تم تفعيل حسابك بنجاح! 🎉', 'success', 5000);
      
      setTimeout(() => {
        const dashboards = { doctor: '/dashboard-doctor.html', institution: '/dashboard-institution.html', patient: '/dashboard-patient.html' };
        const user = getUser();
        window.location = dashboards[user.role] || '/dashboard-patient.html';
      }, 1000);
    } catch (err) {
      alertBox.innerHTML = `<div class="alert alert-error">❌ ${err.message}</div>`;
      btn.disabled = false;
      btn.textContent = 'تفعيل الحساب ✅';
    }
  };

  const resendOTP = async () => {
    const btn = document.getElementById('resendBtn');
    btn.disabled = true;
    btn.textContent = 'جاري الإرسال...';
    try {
      await api('POST', '/auth/send-otp', { phone: currentPhone });
      showToast('تم إعادة إرسال الرمز 📱', 'success');
      setTimeout(() => { btn.disabled = false; btn.textContent = 'إعادة إرسال الرمز'; }, 30000);
    } catch (err) {
      showToast('❌ فشل في إعادة الإرسال', 'error');
      btn.disabled = false;
      btn.textContent = 'إعادة إرسال الرمز';
    }
  };
</script>
</body>
</html>
