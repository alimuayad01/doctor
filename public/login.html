<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | طبيبي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { min-height: 100vh; background: linear-gradient(135deg, var(--primary-dark), var(--primary-light)); display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { background: white; border-radius: var(--radius-xl); padding: 48px 40px; width: 100%; max-width: 460px; box-shadow: var(--shadow-lg); animation: slideUp 0.4s ease; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo a { font-size: 2rem; font-weight: 800; color: var(--primary); }
    .auth-logo a span { color: var(--accent); }
    .auth-logo p { color: var(--text-medium); font-size: 0.9rem; margin-top: 6px; }
    @media(max-width:480px){ .auth-card{ padding: 32px 24px; } }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">
    <a href="/">🏥 طبيبي<span>.</span></a>
    <p>أهلاً بعودتك! سجّل دخولك للمتابعة</p>
  </div>

  <div id="alertBox"></div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label">📧 البريد الإلكتروني</label>
      <input type="email" class="form-control" id="email" placeholder="example@email.com" required>
    </div>
    <div class="form-group">
      <label class="form-label">🔒 كلمة المرور</label>
      <input type="password" class="form-control" id="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn" style="margin-bottom:20px;">
      تسجيل الدخول
    </button>
    <p style="text-align:center;color:var(--text-medium);font-size:0.9rem;">
      ليس لديك حساب؟ <a href="/register.html" style="color:var(--primary);font-weight:700;">إنشاء حساب جديد</a>
    </p>
    <p style="text-align:center;margin-top:12px;">
      <a href="/" style="color:var(--text-light);font-size:0.85rem;">← العودة للرئيسية</a>
    </p>
  </form>
</div>

<script src="/js/api.js"></script>
<script>
  redirectIfLoggedIn();

  const handleLogin = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const alertBox = document.getElementById('alertBox');
    alertBox.innerHTML = '';
    btn.disabled = true;
    btn.textContent = 'جاري تسجيل الدخول...';

    try {
      const data = await api('POST', '/auth/login', {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      });

      setAuth(data.token, data.user);
      showToast('مرحباً بك! جاري تحويلك...', 'success');

      setTimeout(() => {
        const dashboards = { doctor: '/dashboard-doctor.html', institution: '/dashboard-institution.html', patient: '/dashboard-patient.html', admin: '/dashboard-patient.html' };
        window.location = dashboards[data.user.role] || '/dashboard-patient.html';
      }, 800);
    } catch (err) {
      alertBox.innerHTML = `<div class="alert alert-error">❌ ${err.message}</div>`;
      btn.disabled = false;
      btn.textContent = 'تسجيل الدخول';
    }
  };
</script>
</body>
</html>
