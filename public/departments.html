<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الأقسام الطبية | طبيبي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .dept-page { padding: 100px 0 60px; }
    .dept-section { margin-bottom: 48px; }
    .dept-section h2 { font-size: 1.3rem; color: var(--primary); margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--secondary); }
    .dept-big-card {
      background: white;
      border-radius: var(--radius);
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      border: 2px solid transparent;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .dept-big-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--dept-color, var(--primary));
      opacity: 0;
      transition: var(--transition);
    }
    .dept-big-card:hover::before { opacity: 0.05; }
    .dept-big-card:hover { border-color: var(--dept-color, var(--primary)); transform: translateY(-6px); box-shadow: var(--shadow-md); }
    .dept-big-icon { font-size: 3rem; margin-bottom: 12px; }
    .dept-big-name { font-weight: 700; font-size: 0.95rem; color: var(--text-dark); }
    .dept-count { font-size: 0.8rem; color: var(--text-light); margin-top: 6px; }
  </style>
</head>
<body>
<nav class="navbar scrolled" style="background:rgba(255,255,255,0.98);backdrop-filter:blur(20px);">
  <div class="nav-inner">
    <a class="nav-logo" href="/" style="color:var(--primary)">🏥 طبيبي<span>.</span></a>
    <div class="nav-links" style="display:flex">
      <a class="nav-link" href="/search.html" style="color:var(--text-dark)">البحث عن طبيب</a>
      <a class="nav-link" href="/departments.html" style="color:var(--primary);background:rgba(26,107,138,0.08)">الأقسام</a>
      <a class="nav-link" href="/labs.html" style="color:var(--text-dark)">المختبرات</a>
    </div>
    <div class="nav-actions">
      <button class="btn btn-outline btn-sm" onclick="window.location='/login.html'">الدخول</button>
      <button class="btn btn-primary btn-sm" onclick="window.location='/register.html'">سجل</button>
    </div>
  </div>
</nav>

<div class="dept-page">
  <div class="container">
    <div class="page-header" style="text-align:center;margin-bottom:48px">
      <h1 style="font-size:2.2rem;color:var(--text-dark)">الأقسام الطبية</h1>
      <p style="color:var(--text-medium)">اختر قسمك الطبي للبحث عن أفضل المتخصصين</p>
    </div>
    <div id="deptsContainer"><div class="spinner"></div></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  const loadDepts = async () => {
    try {
      const { departments } = await api('GET', '/departments');
      const container = document.getElementById('deptsContainer');
      container.innerHTML = `
        <div class="departments-grid" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr))">
          ${departments.map(d => `
            <div class="dept-big-card" style="--dept-color:${d.color}" onclick="window.location='/search.html?dept=${encodeURIComponent(d.name)}'">
              <div class="dept-big-icon">${d.icon}</div>
              <div class="dept-big-name">${d.name}</div>
              <div class="dept-count">ابحث عن أطباء →</div>
            </div>
          `).join('')}
        </div>
      `;
    } catch {
      document.getElementById('deptsContainer').innerHTML = '<p style="text-align:center;color:var(--danger)">حدث خطأ في التحميل</p>';
    }
  };
  loadDepts();
</script>
</body>
</html>
