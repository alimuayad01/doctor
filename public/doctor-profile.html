<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ملف الطبيب | طبيبي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .profile-hero { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); padding: 100px 0 60px; }
    .profile-card { display: flex; align-items: center; gap: 32px; color: white; }
    .profile-avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 3rem; flex-shrink: 0; }
    .profile-name { font-size: 2rem; font-weight: 800; margin-bottom: 6px; }
    .profile-spec { opacity: 0.85; font-size: 1rem; }
    .profile-main { padding: 48px 0; }
    .profile-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 32px; }
    .section-card { background: white; border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow-sm); margin-bottom: 24px; }
    .section-card h3 { font-size: 1.1rem; color: var(--primary); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--secondary); }
    .cred-badge { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--secondary); border-radius: var(--radius-sm); margin-bottom: 8px; }
    .review-card { padding: 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 12px; }
    .booking-sticky { position: sticky; top: 90px; }
    @media(max-width: 1024px){ .profile-layout { grid-template-columns: 1fr; } .booking-sticky { position: relative; top: auto; } }
    @media(max-width: 600px){ .profile-card { flex-direction: column; text-align: center; } }
  </style>
</head>
<body>

<nav class="navbar scrolled" style="background:rgba(255,255,255,0.98);backdrop-filter:blur(20px);">
  <div class="nav-inner">
    <a class="nav-logo" href="/" style="color:var(--primary)">🏥 طبيبي<span>.</span></a>
    <div class="nav-actions" id="navActions"></div>
  </div>
</nav>

<div class="profile-hero">
  <div class="container" id="profileHero">
    <div class="spinner" style="filter:brightness(5)"></div>
  </div>
</div>

<div class="profile-main">
  <div class="container">
    <div class="profile-layout">
      <!-- Left Column -->
      <div>
        <div class="section-card" id="bioSection" style="display:none">
          <h3>👨‍⚕️ نبذة عن الطبيب</h3>
          <p id="doctorBio" style="color:var(--text-medium);line-height:1.9"></p>
        </div>

        <div class="section-card" id="credsSection" style="display:none">
          <h3>🎓 الشهادات والمؤهلات</h3>
          <div id="credsList"></div>
        </div>

        <div class="section-card" id="expSection" style="display:none">
          <h3>💼 الخبرات العملية</h3>
          <div id="expList"></div>
        </div>

        <div class="section-card">
          <h3>⭐ آراء المرضى</h3>
          <div id="reviewsList"><div class="spinner"></div></div>

          <!-- Add Review -->
          <div id="addReviewSection" style="margin-top:24px;padding-top:24px;border-top:2px solid var(--secondary);display:none">
            <h4 style="margin-bottom:16px;color:var(--text-dark)">أضف تقييمك</h4>
            <div class="form-group">
              <label class="form-label">تقييمك</label>
              <div id="starRating"></div>
            </div>
            <div class="form-group">
              <label class="form-label">تعليقك (اختياري)</label>
              <textarea class="form-control" id="reviewComment" placeholder="شارك تجربتك مع هذا الطبيب..."></textarea>
            </div>
            <div class="form-group">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.9rem;font-weight:600">
                <input type="checkbox" id="reviewAnon" style="width:16px;height:16px"> نشر بشكل مجهول
              </label>
            </div>
            <div id="reviewAlert"></div>
            <button class="btn btn-primary btn-sm" onclick="submitReview()">نشر التقييم</button>
          </div>
        </div>
      </div>

      <!-- Right Column - Booking -->
      <div>
        <div class="section-card booking-sticky">
          <h3>📅 احجز موعداً</h3>
          <div id="bookingInfo" style="margin-bottom:16px"></div>

          <div class="form-group">
            <label class="form-label">اختر التاريخ</label>
            <input type="date" class="form-control" id="bookDate" onchange="loadSlots()">
          </div>

          <div id="slotsSection" style="display:none">
            <label class="form-label">اختر الوقت</label>
            <div class="time-slots-grid" id="slotsGrid"></div>
          </div>

          <div class="form-group" style="margin-top:12px">
            <label class="form-label">نوع الزيارة</label>
            <select class="form-control" id="bookType">
              <option value="كشف">كشف أول</option>
              <option value="متابعة">متابعة</option>
              <option value="استشارة">استشارة</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">ملاحظات</label>
            <textarea class="form-control" id="bookNotes" placeholder="ملاحظاتك..." rows="3"></textarea>
          </div>

          <div id="bookAlert"></div>
          <button class="btn btn-primary btn-full" id="bookBtn" onclick="confirmBooking()">✅ تأكيد الموعد</button>
          <p style="text-align:center;font-size:0.8rem;color:var(--text-light);margin-top:12px">سيُرسل لك تذكير قبل يوم وقبل ساعة من الموعد</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const doctorId = urlParams.get('id');
  let selectedSlot = null;
  let selectedRating = 0;

  if (!doctorId) window.location = '/search.html';

  // Navbar
  const user = getUser();
  const navActions = document.getElementById('navActions');
  if (user && getToken()) {
    navActions.innerHTML = `<button class="btn btn-outline btn-sm" onclick="window.history.back()">← رجوع</button>`;
  } else {
    navActions.innerHTML = `
      <button class="btn btn-outline btn-sm" onclick="window.location='/login.html'">الدخول</button>
      <button class="btn btn-primary btn-sm" onclick="window.location='/register.html'">سجل</button>
    `;
  }

  const loadDoctor = async () => {
    try {
      const { doctor, reviews } = await api('GET', `/doctors/${doctorId}`);

      // Hero
      document.title = `د. ${doctor.user?.name} | طبيبي`;
      document.getElementById('profileHero').innerHTML = `
        <div class="profile-card">
          <div class="profile-avatar">${doctor.user?.avatar ? `<img src="${doctor.user.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">` : '👨‍⚕️'}</div>
          <div>
            <div class="profile-name">د. ${doctor.user?.name}</div>
            <div class="profile-spec">${doctor.specialization} | ${doctor.department}</div>
            <div style="display:flex;gap:16px;margin-top:12px;flex-wrap:wrap">
              <span style="opacity:0.85">📍 ${doctor.governorate}</span>
              ${doctor.clinicName ? `<span style="opacity:0.85">🏥 ${doctor.clinicName}</span>` : ''}
              ${doctor.consultationFee ? `<span style="opacity:0.85">💵 ${doctor.consultationFee.toLocaleString()} دينار</span>` : ''}
            </div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:12px">
              <div style="color:#f59e0b;font-size:1.1rem">${renderStars(doctor.averageRating || 0)}</div>
              <span style="opacity:0.9">${(doctor.averageRating || 0).toFixed(1)} (${doctor.totalReviews || 0} تقييم)</span>
              ${doctor.isAcceptingAppointments ? '<span style="background:rgba(0,200,150,0.2);padding:4px 12px;border-radius:50px;font-size:0.8rem">✅ يستقبل مواعيد</span>' : '<span style="background:rgba(255,100,100,0.2);padding:4px 12px;border-radius:50px;font-size:0.8rem">❌ لا يستقبل</span>'}
            </div>
          </div>
        </div>
      `;

      // Bio
      if (doctor.bio) {
        document.getElementById('bioSection').style.display = 'block';
        document.getElementById('doctorBio').textContent = doctor.bio;
      }

      // Credentials
      if (doctor.credentials?.length > 0) {
        document.getElementById('credsSection').style.display = 'block';
        document.getElementById('credsList').innerHTML = doctor.credentials.map(c => `
          <div class="cred-badge">
            <span style="font-size:1.5rem">🎓</span>
            <div>
              <strong>${c.title}</strong><br>
              <small style="color:var(--text-medium)">${c.institution}${c.year ? ' - ' + c.year : ''} | ${c.type}</small>
            </div>
            ${c.fileUrl ? `<a href="${c.fileUrl}" target="_blank" class="btn btn-outline btn-sm" style="margin-right:auto">عرض الوثيقة</a>` : ''}
          </div>
        `).join('');
      }

      // Experience
      if (doctor.experience?.length > 0) {
        document.getElementById('expSection').style.display = 'block';
        document.getElementById('expList').innerHTML = doctor.experience.map(e => `
          <div class="cred-badge">
            <span style="font-size:1.5rem">💼</span>
            <div>
              <strong>${e.position}</strong><br>
              <small style="color:var(--text-medium)">${e.hospital}${e.from ? ' | ' + new Date(e.from).getFullYear() : ''}${e.current ? ' - حتى الآن' : (e.to ? ' - ' + new Date(e.to).getFullYear() : '')}</small>
            </div>
          </div>
        `).join('');
      }

      // Reviews
      renderReviews(reviews);

      // Booking info
      document.getElementById('bookingInfo').innerHTML = `
        <div style="display:flex;flex-direction:column;gap:6px;font-size:0.9rem">
          <div style="display:flex;align-items:center;gap:8px"><span>👨‍⚕️</span><span>د. ${doctor.user?.name}</span></div>
          ${doctor.clinicAddress ? `<div style="display:flex;align-items:center;gap:8px"><span>📍</span><span>${doctor.clinicAddress}</span></div>` : ''}
          ${doctor.consultationFee ? `<div style="display:flex;align-items:center;gap:8px"><span>💵</span><span style="color:var(--primary);font-weight:700">${doctor.consultationFee.toLocaleString()} دينار</span></div>` : ''}
        </div>
      `;

      // Set min date for booking
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('bookDate').min = today;

      // Show review form if logged in as patient
      if (user && user.role === 'patient') {
        document.getElementById('addReviewSection').style.display = 'block';
        const getRating = createStarRating('starRating', (r) => { selectedRating = r; });
      }

      if (!doctor.isAcceptingAppointments) {
        document.getElementById('bookBtn').disabled = true;
        document.getElementById('bookBtn').textContent = 'الطبيب لا يستقبل مواعيد حالياً';
      }
    } catch (err) {
      document.getElementById('profileHero').innerHTML = `<p style="color:white;text-align:center">تعذر تحميل بيانات الطبيب</p>`;
    }
  };

  const renderReviews = (reviews) => {
    const el = document.getElementById('reviewsList');
    if (!reviews || reviews.length === 0) {
      el.innerHTML = '<p style="color:var(--text-light);text-align:center;padding:20px">لا توجد تقييمات حتى الآن. كن أول من يضيف تقييماً!</p>';
      return;
    }
    el.innerHTML = reviews.map(r => `
      <div class="review-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <strong style="font-size:0.9rem">${r.isAnonymous ? '👤 مجهول' : (r.patient?.name || 'مريض')}</strong>
          <div style="display:flex;align-items:center;gap:8px">
            ${renderStars(r.rating)}
            <small style="color:var(--text-light)">${new Date(r.createdAt).toLocaleDateString('ar-IQ')}</small>
          </div>
        </div>
        ${r.comment ? `<p style="color:var(--text-medium);font-size:0.9rem">${r.comment}</p>` : ''}
        ${r.doctorReply ? `<div style="margin-top:10px;padding:10px;background:var(--secondary);border-radius:var(--radius-sm);font-size:0.85rem"><strong>رد الطبيب:</strong> ${r.doctorReply}</div>` : ''}
      </div>
    `).join('');
  };

  const loadSlots = async () => {
    const date = document.getElementById('bookDate').value;
    if (!date) return;
    const section = document.getElementById('slotsSection');
    const grid = document.getElementById('slotsGrid');
    section.style.display = 'block';
    grid.innerHTML = '<div class="spinner"></div>';
    selectedSlot = null;

    try {
      const { slots } = await api('GET', `/doctors/${doctorId}/available-slots?date=${date}`);
      if (!slots || slots.length === 0) {
        grid.innerHTML = '<p style="color:var(--text-light);text-align:center;grid-column:1/-1;padding:16px">لا توجد أوقات متاحة</p>';
        return;
      }
      grid.innerHTML = slots.map(s => `
        <div class="time-slot${s.isBooked?' booked':''}" onclick="${s.isBooked?'':'selectSlot(\''+s.time+'\',this)'}">
          ${s.time}
        </div>
      `).join('');
    } catch {}
  };

  const selectSlot = (time, el) => {
    document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    selectedSlot = time;
  };

  const confirmBooking = async () => {
    if (!getToken()) {
      showToast('يجب تسجيل الدخول أولاً', 'warning');
      setTimeout(() => window.location = '/login.html', 1500);
      return;
    }
    const alertEl = document.getElementById('bookAlert');
    alertEl.innerHTML = '';
    if (!selectedSlot) { alertEl.innerHTML = '<div class="alert alert-error">يرجى اختيار وقت الموعد</div>'; return; }
    const date = document.getElementById('bookDate').value;
    if (!date) { alertEl.innerHTML = '<div class="alert alert-error">يرجى اختيار التاريخ</div>'; return; }

    const btn = document.getElementById('bookBtn');
    btn.disabled = true; btn.textContent = 'جاري الحجز...';

    try {
      await api('POST', '/appointments', {
        doctorId,
        date,
        startTime: selectedSlot,
        type: document.getElementById('bookType').value,
        notes: document.getElementById('bookNotes').value,
      });
      showToast('تم تأكيد موعدك بنجاح! ✅ ستصل لك رسالة تذكير قبل يوم من الموعد', 'success', 5000);
      alertEl.innerHTML = '<div class="alert alert-success">✅ تم تأكيد الموعد! يمكنك مراجعة مواعيدك من لوحة التحكم</div>';
    } catch (err) {
      alertEl.innerHTML = `<div class="alert alert-error">❌ ${err.message}</div>`;
    } finally {
      btn.disabled = false; btn.textContent = '✅ تأكيد الموعد';
    }
  };

  const submitReview = async () => {
    if (!getToken()) { showToast('يجب تسجيل الدخول', 'warning'); return; }
    if (!selectedRating) { showToast('يرجى اختيار عدد النجوم', 'warning'); return; }
    const alertEl = document.getElementById('reviewAlert');
    try {
      await api('POST', '/reviews', {
        doctorId,
        rating: selectedRating,
        comment: document.getElementById('reviewComment').value,
        isAnonymous: document.getElementById('reviewAnon').checked,
      });
      showToast('تم نشر تقييمك بنجاح ✅', 'success');
      document.getElementById('addReviewSection').style.display = 'none';
      loadDoctor();
    } catch (err) {
      alertEl.innerHTML = `<div class="alert alert-error">❌ ${err.message}</div>`;
    }
  };

  loadDoctor();
</script>
</body>
</html>
