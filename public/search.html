<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>البحث عن طبيب | طبيبي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .search-page { padding-top: 80px; min-height: 100vh; }
    .search-header { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); padding: 40px 0; }
    .search-header h1 { color: white; font-size: 1.8rem; margin-bottom: 24px; text-align:center; }
    .search-filters { background: white; border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-sm); display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)) 120px; gap: 12px; align-items: end; }
    .results-area { padding: 40px 0; }
    .results-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .status-tag { display: inline-flex; align-items:center; gap: 6px; padding: 4px 10px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; margin-bottom: 8px; }
    .status-open { background: #d1fae5; color: #065f46; }
    .status-closed { background: #fee2e2; color: #991b1b; }
    .results-count { font-size: 0.9rem; color: var(--text-medium); }
    .sort-select { padding: 8px 14px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font); font-size: 0.9rem; color: var(--text-dark); background: white; cursor: pointer; outline:none; }
    .no-results { text-align: center; padding: 80px 20px; color: var(--text-light); }
    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 40px; }
    
    .nearest-btn { background: white; color: var(--primary); border: 2px solid var(--primary); padding: 12px 20px; border-radius: 50px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; margin: 0 auto 30px; transition: 0.3s; }
    .nearest-btn:hover { background: var(--primary); color: white; }
    
    .lang-switcher { display: flex; gap: 8px; margin-left: 15px; }
    [dir="ltr"] .lang-switcher { margin-left: 0; margin-right: 15px; }
    .lang-btn { background: rgba(0,0,0,0.05); border: none; padding: 4px 10px; border-radius: 4px; color: var(--text-dark); cursor: pointer; font-size: 0.75rem; font-weight: 700; }
    .lang-btn.active { background: var(--primary); color: white; }

    @media(max-width:768px){ .search-filters{ grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav class="navbar scrolled" style="background:rgba(255,255,255,0.98)!important;backdrop-filter:blur(20px);">
  <div class="nav-inner">
    <a class="nav-logo" href="/" style="color:var(--primary)" data-i18n="app_name">🏥 طبيبي<span>.</span></a>
    
    <div class="lang-switcher">
      <button class="lang-btn" onclick="setLanguage('ar')" id="lang-ar">عربي</button>
      <button class="lang-btn" onclick="setLanguage('ku')" id="lang-ku">کوردی</button>
      <button class="lang-btn" onclick="setLanguage('en')" id="lang-en">EN</button>
    </div>

    <div class="nav-links" id="navLinks" style="display:flex">
      <a class="nav-link" href="/search.html" style="color:var(--primary);background:rgba(26,107,138,0.08)" data-i18n="search">البحث عن طبيب</a>
    </div>
    <div class="nav-actions" id="navActions"></div>
  </div>
</nav>

<div class="search-page">
  <div class="search-header">
    <div class="container">
      <h1 data-i18n="search_doctors">🔍 ابحث عن طبيبك</h1>
      <div class="search-filters">
        <div class="form-group" style="margin:0">
          <label class="form-label" style="color:var(--text-medium)" data-i18n="governorate">المحافظة</label>
          <select class="form-control" id="filterGov">
            <option value="" data-i18n="all_govs">كل المحافظات</option>
          </select>
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label" style="color:var(--text-medium)" data-i18n="department">القسم الطبي</label>
          <select class="form-control" id="filterDept">
            <option value="" data-i18n="all_depts">كل الأقسام</option>
          </select>
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label" style="color:var(--text-medium)" data-i18n="doctor_name">اسم الطبيب</label>
          <input type="text" class="form-control" id="filterName" data-i18n="search_placeholder" placeholder="بحث باسم الطبيب...">
        </div>
        <button class="btn btn-primary" onclick="searchDoctors(1)" style="height:48px" data-i18n="confirm">بحث</button>
      </div>
    </div>
  </div>

  <div class="results-area">
    <div class="container">
      
      <button class="nearest-btn" onclick="findNearest()" data-i18n="find_nearest">
        <span>📍</span> <span data-i18n="find_nearest">الأطباء الأقرب إليك</span>
      </button>
      
      <!-- Suggestions Container -->
      <div id="searchSuggestions" style="margin-bottom:20px; display:none; background:rgba(26,107,138,0.05); padding:12px; border-radius:var(--radius-sm); border-right:4px solid var(--primary);">
        <p style="color:var(--text-medium); margin:0;">🧐 هل تقصد: <span id="suggestionList"></span></p>
      </div>
      
      <div class="results-info">
        <p class="results-count" id="resultsCount">جاري البحث...</p>
        <select class="sort-select" onchange="sortResults(this.value)">
          <option value="rating">الأعلى تقييماً</option>
          <option value="appointments">الأكثر طلباً</option>
        </select>
      </div>
      <div class="doctors-grid" id="resultsGrid">
        <div class="spinner" style="grid-column:1/-1"></div>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>

<!-- Booking Modal -->
<div id="bookingModal" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3>📅 حجز موعد</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="modalDoctorInfo" style="display:flex;align-items:center;gap:12px;padding:16px;background:var(--secondary);border-radius:var(--radius-sm);margin-bottom:20px;"></div>
      <div class="form-group">
        <label class="form-label">📅 اختر التاريخ</label>
        <input type="date" class="form-control" id="bookDate" min="" onchange="loadSlots()">
      </div>
      <div id="slotsSection" style="display:none">
        <label class="form-label">⏰ اختر الوقت المناسب</label>
        <div class="time-slots-grid" id="slotsGrid"></div>
      </div>
      <div class="form-group" style="margin-top:16px">
        <label class="form-label">نوع الزيارة</label>
        <select class="form-control" id="bookType">
          <option value="كشف">كشف أول</option>
          <option value="متابعة">متابعة</option>
          <option value="استشارة">استشارة</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">ملاحظات (اختياري)</label>
        <textarea class="form-control" id="bookNotes" placeholder="أي معلومات تريد إيصالها للطبيب..."></textarea>
      </div>
      <div id="bookAlert"></div>
      <button class="btn btn-primary btn-full btn-lg" onclick="confirmBooking()" id="bookBtn">✅ تأكيد الحجز</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/i18n.js"></script>
<script>
  let currentDoctorId = null;
  let currentPage = 1;
  let totalPages = 1;
  let userCoords = null;

  // Language buttons visual update
  document.getElementById(`lang-${currentLang}`).classList.add('active');

  const findNearest = () => {
    if (!navigator.geolocation) {
      showToast('المتصفح لا يدعم تحديد الموقع', 'error');
      return;
    }
    
    showToast('جاري تحديد موقعك...', 'info');
    navigator.geolocation.getCurrentPosition(async (pos) => {
      userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      showToast('تم تحديد الموقع! جاري جلب الأطباء الأقرب...', 'success');
      searchDoctors(1);
    }, (err) => {
      showToast('يرجى السماح بالوصول للموقع للعثور على أقرب الأطباء', 'warning');
    });
  };

  const calculateDistance = (lat1, lon1, lat2, lon2) => {
    if (!lat1 || !lon1 || !lat2 || !lon2) return null;
    const R = 6371; // km
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  };

  const isDoctorOpen = (doctor) => {
    if (!doctor.schedule || doctor.schedule.length === 0) return false;
    const iraqTime = new Intl.DateTimeFormat('en-US', {
      timeZone: 'Asia/Baghdad',
      hour: 'numeric', minute: 'numeric', second: 'numeric',
      hour12: false, weekday: 'long'
    }).formatToParts(new Date());

    const dayNameMap = { 'Saturday': 'السبت', 'Sunday': 'الأحد', 'Monday': 'الاثنين', 'Tuesday': 'الثلاثاء', 'Wednesday': 'الأربعاء', 'Thursday': 'الخميس', 'Friday': 'الجمعة' };
    const englishDay = iraqTime.find(p => p.type === 'weekday').value;
    const dayName = dayNameMap[englishDay];
    const hour = parseInt(iraqTime.find(p => p.type === 'hour').value);
    const minute = parseInt(iraqTime.find(p => p.type === 'minute').value);
    
    const sch = doctor.schedule.find(s => s.day === dayName && s.isAvailable);
    if (!sch) return false;

    const [sh, sm] = sch.startTime.split(':').map(Number);
    const [eh, em] = sch.endTime.split(':').map(Number);
    const current = hour * 60 + minute;
    return current >= (sh * 60 + sm) && current <= (eh * 60 + em);
  };

  // Setup navbar
  const user = getUser();
  const navActions = document.getElementById('navActions');
  if (user && getToken()) {
    const dashboards = { doctor: '/dashboard-doctor.html', institution: '/dashboard-institution.html', patient: '/dashboard-patient.html' };
    navActions.innerHTML = `<button class="btn btn-outline btn-sm" onclick="window.location='${dashboards[user.role] || '/dashboard-patient.html'}'">${t('login')}</button>`;
  } else {
    navActions.innerHTML = `
      <button class="btn btn-outline btn-sm" onclick="window.location='/login.html'">${t('login')}</button>
      <button class="btn btn-primary btn-sm" onclick="window.location='/register.html'">${t('register')}</button>
    `;
  }

  const searchDoctors = async (page = 1) => {
    currentPage = page;
    const gov = document.getElementById('filterGov').value;
    const dept = document.getElementById('filterDept').value;
    const name = document.getElementById('filterName').value;

    const params = new URLSearchParams({ page, limit: 12 });
    if (gov) params.set('governorate', gov);
    if (dept) params.set('department', dept);
    if (name) params.set('name', name);
    if (userCoords) {
        params.set('lat', userCoords.lat);
        params.set('lng', userCoords.lng);
    }

    document.getElementById('resultsGrid').innerHTML = '<div class="spinner" style="grid-column:1/-1"></div>';
    document.getElementById('searchSuggestions').style.display = 'none';

    try {
      const resp = await api('GET', `/doctors?${params}`);
      const { doctors, total, pages, suggestions } = resp;
      totalPages = pages;

      document.getElementById('resultsCount').textContent = `${t('confirm')}: ${total}`;

      if (suggestions && suggestions.length > 0) {
        const suggContainer = document.getElementById('searchSuggestions');
        const suggList = document.getElementById('suggestionList');
        suggList.innerHTML = suggestions.map(s => `<a href="javascript:void(0)" onclick="applySuggestion('${s}')" style="color:var(--primary);font-weight:700;margin-left:12px;text-decoration:underline;">${s}</a>`).join('');
        suggContainer.style.display = 'block';
      }

      if (!doctors || doctors.length === 0) {
        document.getElementById('resultsGrid').innerHTML = `<div class="no-results" style="grid-column:1/-1"><h3>${t('search_placeholder')}</h3></div>`;
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      document.getElementById('resultsGrid').innerHTML = doctors.map(d => {
        const isOpen = isDoctorOpen(d);
        const distance = d.distance !== undefined ? d.distance
          : (userCoords && d.location?.lat ? calculateDistance(userCoords.lat, userCoords.lng, d.location.lat, d.location.lng) : null);
        
        return `
        <div class="doctor-card">
          <div class="doctor-card-header">
            <div class="doctor-avatar">${d.user?.avatar ? `<img src="${d.user.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">` : '👨‍⚕️'}</div>
            <div>
              <div class="doctor-card-name">د. ${d.user?.name || '---'}</div>
              <div class="doctor-card-spec">${d.specialization}</div>
              ${distance ? `<div style="font-size:0.75rem;color:var(--primary);font-weight:700;margin-top:4px">📍 ${(distance.toFixed(1))} km</div>` : ''}
            </div>
          </div>
          <div class="doctor-card-body">
            <span class="status-tag ${isOpen?'status-open':'status-closed'}">${isOpen ? t('open_now') : t('closed_now')}</span>
            <div class="doctor-meta">
              <div class="doctor-meta-item">📍 ${t(d.governorate)}</div>
              <div class="doctor-meta-item">🏥 ${t(d.department)}</div>
            </div>
            <div style="display:flex;gap:8px;margin-top:15px;">
              <button class="btn btn-outline btn-sm" style="flex:1" onclick="window.location='/doctor-profile.html?id=${d._id}'">${t('about_doctor')}</button>
              <button class="btn btn-primary btn-sm" style="flex:1" onclick="openBooking('${d._id}','${d.user?.name}','${d.specialization}','${d.governorate}')">📅 ${t('book_now')}</button>
            </div>
          </div>
        </div>
      `}).join('');

      let pagHtml = '';
      if (page > 1) pagHtml += `<button class="page-btn" onclick="searchDoctors(${page-1})">‹</button>`;
      for (let i = 1; i <= pages; i++) {
        pagHtml += `<button class="page-btn${i===page?' active':''}" onclick="searchDoctors(${i})">${i}</button>`;
      }
      if (page < pages) pagHtml += `<button class="page-btn" onclick="searchDoctors(${page+1})">›</button>`;
      document.getElementById('pagination').innerHTML = pagHtml;
    } catch (err) {
      document.getElementById('resultsGrid').innerHTML = `<p style="grid-column:1/-1;text-align:center;color:var(--danger)">${err.message}</p>`;
    }
  };

  const loadFilters = async () => {
    try {
      const [govRes, deptRes] = await Promise.all([api('GET', '/departments/governorates'), api('GET', '/departments')]);
      const govSel = document.getElementById('filterGov');
      const deptSel = document.getElementById('filterDept');
      govSel.innerHTML = `<option value="">${t('all_govs')}</option>`;
      govRes.governorates.forEach(g => { const opt = document.createElement('option'); opt.value = g; opt.textContent = t(g); govSel.appendChild(opt); });
      deptSel.innerHTML = `<option value="">${t('all_depts')}</option>`;
      deptRes.departments.forEach(d => { const opt = document.createElement('option'); opt.value = d.name; opt.textContent = t(d.name); deptSel.appendChild(opt); });
    } catch {}
  };

  const applySuggestion = (name) => { document.getElementById('filterName').value = name; searchDoctors(1); };

  const openBooking = (doctorId, name, spec, gov) => {
    if (!getToken()) { showToast(t('login'), 'warning'); return; }
    currentDoctorId = doctorId;
    document.getElementById('modalDoctorInfo').innerHTML = `<div><strong>د. ${name}</strong><br><small>${spec}</small></div>`;
    document.getElementById('bookingModal').style.display = 'flex';
  };

  const closeModal = () => { document.getElementById('bookingModal').style.display = 'none'; };

  loadFilters().then(() => searchDoctors(1));
  document.getElementById('filterName').addEventListener('keydown', e => { if (e.key === 'Enter') searchDoctors(1); });
</script>
</body>
</html>
